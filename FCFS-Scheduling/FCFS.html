<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FCFS Scheduling Simulator</title>

<style>

    body{
        font-family: Arial, sans-serif;

        /* BACKGROUND IMAGE */
        background-image: url('https://images.unsplash.com/photo-1515879218367-8466d910aaa4');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        padding:20px;
    }

    h1{
        text-align:center;
        color:black;
    }

    .container{
        max-width:1100px;
        margin:auto;

        /* Transparent white background */
        background:rgba(255,255,255,0.92);

        padding:20px;
        border-radius:10px;
        box-shadow:0 0 15px rgba(0,0,0,0.3);
    }

    /* TOP IMAGE */
    .top-image{
        width:100%;
        height:220px;
        object-fit:cover;
        border-radius:10px;
        margin-bottom:20px;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
    }

    table, th, td{
        border:1px solid #ccc;
    }

    th{
        background:#007bff;
        color:white;
        padding:12px;
        font-size:18px;
    }

    td{
        padding:10px;
        text-align:center;
        font-size:18px;
    }

    input{
        width:100px;
        padding:8px;
        font-size:16px;
    }

    button{
        padding:12px 18px;
        border:none;
        background:#28a745;
        color:white;
        border-radius:5px;
        cursor:pointer;
        margin-top:10px;
        font-size:16px;
    }

    button:hover{
        background:#218838;
    }

    /* BIGGER GANTT CHART */
    #ganttChart{
        display:flex;
        margin-top:50px;
        align-items:flex-end;
        flex-wrap:nowrap;

        overflow-x:auto;

        padding-bottom:70px;
    }

    .gantt-block{
        position:relative;
        border:2px solid #222;
        background:#17a2b8;
        color:white;
        text-align:center;

        /* BIGGER HEIGHT */
        padding:45px 0;

        margin-right:5px;

        /* BIGGER WIDTH */
        min-width:120px;

        font-weight:bold;
        font-size:28px;

        border-radius:8px;
    }

    .time{
        position:absolute;
        bottom:-40px;
        left:0;
        color:black;
        font-size:22px;
        font-weight:bold;
    }

    .time-end{
        position:absolute;
        bottom:-40px;
        right:-5px;
        color:black;
        font-size:22px;
        font-weight:bold;
    }

    .results{
        margin-top:30px;
    }

    .avg{
        margin-top:20px;
        font-weight:bold;
        color:#333;
        font-size:24px;
    }

</style>
</head>

<body>

<div class="container">

    <!-- TOP IMAGE -->
    <img class="top-image"
    src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3"
    alt="CPU Scheduling">

    <h1>FCFS Scheduling Simulator</h1>

    <button onclick="addProcess()">Add Process</button>

    <table id="processTable">
        <thead>
            <tr>
                <th>Process</th>
                <th>Arrival Time</th>
                <th>Burst Time</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>P1</td>
                <td><input type="number" value="0"></td>
                <td><input type="number" value="5"></td>
            </tr>
        </tbody>
    </table>

    <button onclick="calculateFCFS()">Calculate</button>

    <div class="results">

        <h2>Results</h2>

        <table id="resultTable">
            <thead>
                <tr>
                    <th>Process</th>
                    <th>Arrival</th>
                    <th>Burst</th>
                    <th>Completion</th>
                    <th>Turnaround</th>
                    <th>Waiting</th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>

        <div class="avg" id="averages"></div>

    </div>

    <h2>Gantt Chart</h2>
    <div id="ganttChart"></div>

</div>

<script>

let processCount = 1;

function addProcess(){

    processCount++;

    const table = document.getElementById("processTable")
                    .getElementsByTagName("tbody")[0];

    const row = table.insertRow();

    row.innerHTML = `
        <td>P${processCount}</td>
        <td><input type="number" value="0"></td>
        <td><input type="number" value="1"></td>
    `;
}

function calculateFCFS(){

    const rows = document.querySelectorAll("#processTable tbody tr");

    let processes = [];

    rows.forEach((row,index)=>{

        const arrival = parseInt(row.cells[1].children[0].value);
        const burst = parseInt(row.cells[2].children[0].value);

        processes.push({
            process: "P"+(index+1),
            arrival: arrival,
            burst: burst
        });

    });

    processes.sort((a,b)=> a.arrival - b.arrival);

    let currentTime = 0;
    let totalWT = 0;
    let totalTAT = 0;

    const resultBody = document.querySelector("#resultTable tbody");
    resultBody.innerHTML = "";

    const gantt = document.getElementById("ganttChart");
    gantt.innerHTML = "";

    processes.forEach(p=>{

        if(currentTime < p.arrival){
            currentTime = p.arrival;
        }

        let startTime = currentTime;

        let completion = currentTime + p.burst;
        let turnaround = completion - p.arrival;
        let waiting = turnaround - p.burst;

        totalWT += waiting;
        totalTAT += turnaround;

        currentTime = completion;

        let row = resultBody.insertRow();

        row.innerHTML = `
            <td>${p.process}</td>
            <td>${p.arrival}</td>
            <td>${p.burst}</td>
            <td>${completion}</td>
            <td>${turnaround}</td>
            <td>${waiting}</td>
        `;

        let block = document.createElement("div");
        block.className = "gantt-block";

        /* BIGGER WIDTH */
        block.style.width = (p.burst * 90) + "px";

        block.innerHTML = `
            ${p.process}
            <div class="time">${startTime}</div>
            <div class="time-end">${completion}</div>
        `;

        gantt.appendChild(block);

    });

    const avgWT = (totalWT / processes.length).toFixed(2);
    const avgTAT = (totalTAT / processes.length).toFixed(2);

    document.getElementById("averages").innerHTML = `
        Average Waiting Time: ${avgWT} <br>
        Average Turnaround Time: ${avgTAT}
    `;
}

</script>

</body>
</html>
